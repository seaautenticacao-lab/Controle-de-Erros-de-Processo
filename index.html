<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria ISP - Sistema de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #f4f7fc; --primary: #4e73df; --secondary: #858796; 
            --danger: #e74a3b; --success: #1cc88a; --dark: #5a5c69; --white: #ffffff; 
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header e Status */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-badge { font-size: 12px; padding: 6px 15px; border-radius: 30px; background: #fff; border: 1px solid #ddd; font-weight: bold; }

        /* Dashboard Cards */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--white); padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--primary);
            transition: 0.3s;
        }
        .stat-card h3 { margin: 0; font-size: 11px; text-transform: uppercase; color: var(--primary); letter-spacing: 1.5px; }
        .stat-card p { margin: 10px 0 0; font-size: 26px; font-weight: 800; }

        /* Formulário de Registro */
        .form-container { 
            background: var(--white); padding: 25px; border-radius: 15px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; 
            align-items: end; margin-bottom: 20px; 
        }
        .form-group { display: flex; flex-direction: column; gap: 8px; font-size: 13px; font-weight: 700; color: #444; }
        input, select { padding: 12px; border: 1px solid #d1d9e6; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(78,115,223,0.1); }

        /* Ações e Busca */
        .action-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-box { flex-grow: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; color: white; }
        .btn-save { background: var(--primary); }
        .btn-save:hover { background: #2e59d9; }
        .loading { opacity: 0.5; pointer-events: none; }

        /* Layout Gráficos */
        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background: var(--white); padding: 20px; border-radius: 15px; height: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Tabela */
        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fc; padding: 18px; text-align: left; font-size: 13px; color: var(--secondary); border-bottom: 2px solid #e3e6f0; }
        td { padding: 15px 18px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .badge-err { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; background: #fff5f5; color: var(--danger); border: 1px solid #fed7d7; }

        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; color: var(--dark); letter-spacing: -1px;">📊 Auditoria ISP</h1>
            <div id="status" class="status-badge">● Sincronizando...</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:var(--success)" onclick="exportarCSV()">📥 CSV</button>
            <button class="btn" style="background:var(--dark)" onclick="limparTudo()">🗑️ Limpar Tudo</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><h3>Total de Registros</h3><p id="stat-total">0</p></div>
        <div class="stat-card" style="border-left-color: var(--success)"><h3>Cidades Únicas</h3><p id="stat-cidades">0</p></div>
        <div class="stat-card" style="border-left-color: #f6c23e"><h3>Maior Incidência</h3><p id="stat-consultor">-</p></div>
    </div>

    <div class="form-container">
        <div class="form-group">Cliente <input type="text" id="cliente" placeholder="Nome do assinante"></div>
        <div class="form-group">Tipo de Erro
            <select id="tipoErro">
                <option value="Dinâmico ao invés de Atribuição">Dinâmico ao invés de Atribuição</option>
                <option value="Atribuição ao invés de Dinâmico">Atribuição ao invés de Dinâmico</option>
                <option value="Dinamico com Ip">Dinamico com Ip</option>
                <option value="Atribuição sem IP">Atribuição sem IP</option>
                <option value="Concentrador errado (Antigo)">Concentrador errado (Antigo)</option>
                <option value="Sem conexão criada">Sem conexão criada</option>
                <option value="Concentrador Errado de Outra Cidade">Concentrador Errado de Outra Cidade</option>
                <option value="PPPoE fora do padrão">PPPoE fora do padrão</option>
            </select>
        </div>
        <div class="form-group">Cidade <input type="text" id="cidade" placeholder="Ex: CURUÇÁ"></div>
        <div class="form-group">Consultor <input type="text" id="consultor" placeholder="Nome do técnico"></div>
        <button id="btnSalvar" class="btn btn-save" onclick="adicionarRegistro()">💾 Registrar</button>
    </div>

    <div class="action-bar">
        <input type="text" id="search" class="search-box" placeholder="🔍 Filtrar por qualquer termo..." onkeyup="render()">
    </div>

    <div class="dashboard-grid">
        <div class="chart-card"><canvas id="graficoCidades"></canvas></div>
        <div class="chart-card"><canvas id="graficoConsultores"></canvas></div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Cliente</th><th>Tipo de Erro</th><th>Cidade</th><th>Consultor</th><th width="50"></th></tr></thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<script>
    // Configurações API
    const BIN_ID = "69b9560faa77b81da9f1b46d";
    const MASTER_KEY = "$2a$10$OCvV0EQunKhQKKTZBhUQ/.//aQrFwn6qeIzDL2qBCrX1jLMcKCDcy";
    const URL_BIN = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let registros = [];
    let chartCids, chartCons;

    // Função para limpar strings (Remove espaços duplos e trim)
    function normalizar(texto) {
        return texto.toString().trim().replace(/\s+/g, ' ').toUpperCase();
    }

    async function carregar() {
        try {
            const r = await fetch(`${URL_BIN}/latest`, { headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" } });
            const d = await r.json();
            // Normaliza a base carregada caso existam dados antigos com espaços
            registros = (d.registros || []).map(reg => ({
                ...reg,
                cidade: normalizar(reg.cidade),
                consultor: normalizar(reg.consultor),
                cliente: normalizar(reg.cliente)
            }));
            atualizarStatus("Conectado", "var(--success)");
        } catch (e) {
            atualizarStatus("Offline / Erro", "var(--danger)");
        }
        render();
    }

    async function salvar() {
        const btn = document.getElementById('btnSalvar');
        btn.classList.add('loading');
        atualizarStatus("Salvando...", "#f6c23e");

        try {
            await fetch(URL_BIN, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify({ registros: registros })
            });
            atualizarStatus("Dados Sincronizados", "var(--success)");
        } catch (e) {
            alert("Erro na conexão com a nuvem.");
        } finally {
            btn.classList.remove('loading');
        }
    }

    function adicionarRegistro() {
        const inputs = {
            cliente: document.getElementById('cliente'),
            cidade: document.getElementById('cidade'),
            consultor: document.getElementById('consultor'),
            erro: document.getElementById('tipoErro')
        };

        if(!inputs.cliente.value || !inputs.cidade.value || !inputs.consultor.value) {
            return alert("Por favor, preencha todos os campos.");
        }

        const novo = {
            id: Date.now(),
            cliente: normalizar(inputs.cliente.value),
            cidade: normalizar(inputs.cidade.value),
            consultor: normalizar(inputs.consultor.value),
            tipoErro: inputs.erro.value
        };

        registros.push(novo);
        inputs.cliente.value = ""; // Limpa apenas o nome do cliente para agilizar
        render();
        salvar();
    }

    function excluirItem(id) {
        if(confirm("Excluir este registro permanentemente?")) {
            registros = registros.filter(r => r.id !== id);
            render();
            salvar();
        }
    }

    function render() {
        const busca = normalizar(document.getElementById('search').value);
        const corpo = document.getElementById('tabelaCorpo');
        
        const filtrados = registros.filter(r => 
            r.cliente.includes(busca) || 
            r.cidade.includes(busca) || 
            r.consultor.includes(busca) ||
            r.tipoErro.toUpperCase().includes(busca)
        );

        corpo.innerHTML = filtrados.slice().reverse().map(r => `
            <tr>
                <td><strong>${r.cliente}</strong></td>
                <td><span class="badge-err">${r.tipoErro}</span></td>
                <td>${r.cidade}</td>
                <td>${r.consultor}</td>
                <td><button onclick="excluirItem(${r.id})" style="border:none; background:none; cursor:pointer;">🗑️</button></td>
            </tr>
        `).join('');

        // Stats
        document.getElementById('stat-total').innerText = registros.length;
        const cidadesUnicas = [...new Set(registros.map(r => r.cidade))];
        document.getElementById('stat-cidades').innerText = cidadesUnicas.length;
        
        if(registros.length > 0) {
            const counts = {};
            registros.forEach(r => counts[r.consultor] = (counts[r.consultor] || 0) + 1);
            const lider = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            document.getElementById('stat-consultor').innerText = lider;
        }

        renderCharts();
    }

    function renderCharts() {
        // Objeto para consolidar dados já normalizados
        const cids = {}, cons = {};
        registros.forEach(r => { 
            cids[r.cidade] = (cids[r.cidade] || 0) + 1; 
            cons[r.consultor] = (cons[r.consultor] || 0) + 1; 
        });

        if(chartCids) chartCids.destroy();
        if(chartCons) chartCons.destroy();

        // Gráfico de Barras (Cidades)
        chartCids = new Chart(document.getElementById('graficoCidades'), {
            type: 'bar',
            data: {
                labels: Object.keys(cids),
                datasets: [{ label: 'Erros', data: Object.values(cids), backgroundColor: '#4e73df', borderRadius: 5 }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // Gráfico de Rosca (Consultores) - Aqui as duplicatas são evitadas pela normalização
        chartCons = new Chart(document.getElementById('graficoConsultores'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cons),
                datasets: [{ 
                    data: Object.values(cons), 
                    backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#6610f2', '#5a5c69', '#f8f9fc'],
                    borderWidth: 2
                }]
            },
            options: { 
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
            }
        });
    }

    function atualizarStatus(txt, cor) {
        const s = document.getElementById('status');
        s.innerText = "● " + txt;
        s.style.color = cor;
    }

    function exportarCSV() {
        let csv = "\ufeffCliente;Erro;Cidade;Consultor\n" + registros.map(r => `${r.cliente};${r.tipoErro};${r.cidade};${r.consultor}`).join("\n");
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `auditoria_${new Date().toISOString().slice(0,10)}.csv`; l.click();
    }

    async function limparTudo() {
        if(confirm("Isso apagará todos os dados da nuvem. Deseja continuar?")) {
            registros = [];
            render();
            await salvar();
        }
    }

    // Iniciar
    carregar();
</script>
</body>
</html>
