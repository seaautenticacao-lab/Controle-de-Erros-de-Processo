<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria ISP - Controle Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { 
            --bg: #f4f7fc; --primary: #4e73df; --secondary: #858796; 
            --danger: #e74a3b; --success: #1cc88a; --dark: #5a5c69; --white: #ffffff; 
            --warning: #f6c23e; --info: #36b9cc;
        }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-badge { font-size: 12px; padding: 6px 15px; border-radius: 30px; background: #fff; border: 1px solid #ddd; font-weight: bold; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--primary); }
        .stat-card h3 { margin: 0; font-size: 11px; text-transform: uppercase; color: var(--primary); letter-spacing: 1.5px; }
        .stat-card p { margin: 10px 0 0; font-size: 26px; font-weight: 800; }

        .form-container { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; font-size: 13px; font-weight: 700; color: #444; }
        input, select { padding: 12px; border: 1px solid #d1d9e6; border-radius: 10px; font-size: 14px; outline: none; }

        .dashboard-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: var(--white); padding: 20px; border-radius: 15px; height: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }

        /* Rankings Estendidos */
        .rankings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; align-items: start; }
        .ranking-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--info); max-height: 500px; overflow-y: auto; }
        .ranking-card h4 { position: sticky; top: 0; background: white; margin-top: 0; color: var(--dark); border-bottom: 2px solid #f4f7fc; padding-bottom: 10px; display: flex; justify-content: space-between; z-index: 10; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .rank-count { font-weight: 800; color: var(--danger); background: #fff5f5; padding: 2px 8px; border-radius: 5px; min-width: 25px; text-align: center; }

        .filter-info { background: #eef2ff; padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: none; align-items: center; justify-content: space-between; border: 1px dashed var(--primary); }
        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fc; padding: 18px; text-align: left; font-size: 13px; color: var(--secondary); border-bottom: 2px solid #e3e6f0; }
        td { padding: 15px 18px; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .badge-err { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; background: #fff5f5; color: var(--danger); border: 1px solid #fed7d7; }

        @media (max-width: 900px) { .dashboard-grid, .rankings-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; color: var(--dark); letter-spacing: -1px;">📊 Auditoria ISP</h1>
            <div id="status" class="status-badge">● Conectando...</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="background:var(--success); border-radius:10px; padding:10px 20px; color:white; border:none; cursor:pointer; font-weight:bold;" onclick="exportarCSV()">📥 Exportar CSV</button>
            <button class="btn" style="background:var(--dark); border-radius:10px; padding:10px 20px; color:white; border:none; cursor:pointer; font-weight:bold;" onclick="limparTudo()">🗑️ Resetar Tudo</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><h3>Total de Registros</h3><p id="stat-total">0</p></div>
        <div class="stat-card" style="border-left-color: var(--success)"><h3>Cidades Únicas</h3><p id="stat-cidades">0</p></div>
        <div class="stat-card" style="border-left-color: var(--warning)"><h3>Maior Incidência</h3><p id="stat-consultor">-</p></div>
    </div>

    <div class="form-container">
        <div class="form-group">Cliente <input type="text" id="cliente" placeholder="Nome do assinante"></div>
        <div class="form-group">Tipo de Erro
            <select id="tipoErro">
                <option value="Dinâmico ao invés de Atribuição">Dinâmico ao invés de Atribuição</option>
                <option value="Atribuição ao invés de Dinâmico">Atribuição ao invés de Dinâmico</option>
                <option value="Dinamico com Ip">Dinamico com Ip</option>
                <option value="Atribuição sem IP">Atribuição sem IP</option>
                <option value="Concentrador errado (Antigo)">Concentrador errado (Antigo)</option>
                <option value="Sem conexão criada">Sem conexão criada</option>
                <option value="Concentrador Errado de Outra Cidade">Concentrador Errado de Outra Cidade</option>
                <option value="PPPoE fora do padrão">PPPoE fora do padrão</option>
            </select>
        </div>
        <div class="form-group">Cidade <input type="text" id="cidade" placeholder="Ex: CURUÇÁ"></div>
        <div class="form-group">Consultor <input type="text" id="consultor" placeholder="Nome do técnico"></div>
        <button id="btnSalvar" style="background:var(--primary); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="adicionarRegistro()">💾 Registrar</button>
    </div>

    <div id="avisoFiltro" class="filter-info">
        <span>📍 Visão Detalhada: <strong id="nomeFiltro"></strong></span>
        <button style="background:var(--secondary); color:white; border:none; padding:5px 15px; border-radius:8px; cursor:pointer;" onclick="limparFiltroGrafico()">Restaurar Visão Geral X</button>
    </div>

    <div style="margin-bottom:20px;">
        <input type="text" id="search" style="width:100%; box-sizing:border-box; padding:12px; border-radius:10px; border:1px solid #ddd;" placeholder="🔍 Buscar na tabela..." onkeyup="render()">
    </div>

    <div class="dashboard-grid">
        <div class="chart-card">
            <h4 id="tituloBarra" style="margin:0 0 10px 0; font-size: 14px; color: var(--secondary)">Erros por Cidade</h4>
            <canvas id="graficoCidades"></canvas>
        </div>
        <div class="chart-card">
            <h4 style="margin:0 0 10px 0; font-size: 14px; color: var(--secondary)">Consultores (Clique p/ filtrar)</h4>
            <canvas id="graficoConsultores"></canvas>
        </div>
    </div>

    <div class="rankings-row">
        <div class="ranking-card">
            <h4>🏆 Ranking de Consultores <span>Erros</span></h4>
            <div id="rankConsultores"></div>
        </div>
        <div class="ranking-card">
            <h4>⚠️ Erros Mais Comuns <span>Qtd</span></h4>
            <div id="rankErros"></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Cliente</th><th>Tipo de Erro</th><th>Cidade</th><th>Consultor</th><th width="50"></th></tr></thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    const BIN_ID = "69b9560faa77b81da9f1b46d";
    const MASTER_KEY = "$2a$10$OCvV0EQunKhQKKTZBhUQ/.//aQrFwn6qeIzDL2qBCrX1jLMcKCDcy";
    const URL_BIN = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let registros = [];
    let chartCids, chartCons;
    let filtroConsultorAtivo = null;

    function normalizar(texto) { return texto.toString().trim().replace(/\s+/g, ' ').toUpperCase(); }

    async function carregar() {
        try {
            const r = await fetch(`${URL_BIN}/latest`, { headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" } });
            const d = await r.json();
            registros = (d.registros || []).map(reg => ({...reg, cidade: normalizar(reg.cidade), consultor: normalizar(reg.consultor), cliente: normalizar(reg.cliente)}));
            atualizarStatus("Conectado", "var(--success)");
            render();
        } catch (e) { atualizarStatus("Erro na Nuvem", "var(--danger)"); }
    }

    async function salvar() {
        atualizarStatus("Sincronizando...", "var(--warning)");
        try {
            await fetch(URL_BIN, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify({ registros: registros })
            });
            atualizarStatus("Sincronizado", "var(--success)");
        } catch (e) { alert("Erro ao salvar."); }
    }

    function adicionarRegistro() {
        const c = document.getElementById('cliente'), ci = document.getElementById('cidade'), co = document.getElementById('consultor'), e = document.getElementById('tipoErro');
        if(!c.value || !ci.value || !co.value) return alert("Preencha tudo!");
        registros.push({ id: Date.now(), cliente: normalizar(c.value), cidade: normalizar(ci.value), consultor: normalizar(co.value), tipoErro: e.value });
        c.value = ""; render(); salvar();
    }

    function excluirItem(id) { if(confirm("Excluir?")) { registros = registros.filter(r => r.id !== id); render(); salvar(); } }

    function render() {
        const busca = normalizar(document.getElementById('search').value);
        const corpo = document.getElementById('tabelaCorpo');
        const baseDados = filtroConsultorAtivo ? registros.filter(r => r.consultor === filtroConsultorAtivo) : registros;
        const filtrados = baseDados.filter(r => r.cliente.includes(busca) || r.cidade.includes(busca) || r.consultor.includes(busca) || r.tipoErro.toUpperCase().includes(busca));

        corpo.innerHTML = filtrados.slice().reverse().map(r => `
            <tr>
                <td><strong>${r.cliente}</strong></td>
                <td><span class="badge-err">${r.tipoErro}</span></td>
                <td>${r.cidade}</td>
                <td>${r.consultor}</td>
                <td><button onclick="excluirItem(${r.id})" style="border:none; background:none; cursor:pointer;">🗑️</button></td>
            </tr>
        `).join('');

        document.getElementById('stat-total').innerText = registros.length;
        document.getElementById('stat-cidades').innerText = [...new Set(registros.map(r => r.cidade))].length;
        
        if(registros.length > 0) {
            const counts = {};
            registros.forEach(r => counts[r.consultor] = (counts[r.consultor] || 0) + 1);
            document.getElementById('stat-consultor').innerText = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        }

        renderCharts();
        atualizarRankings();
    }

    function renderCharts() {
        const cids = {}, cons = {};
        registros.forEach(r => { 
            cids[r.cidade] = (cids[r.cidade] || 0) + 1; 
            cons[r.consultor] = (cons[r.consultor] || 0) + 1; 
        });

        if(chartCids) chartCids.destroy();
        if(chartCons) chartCons.destroy();

        chartCids = new Chart(document.getElementById('graficoCidades'), {
            type: 'bar',
            data: {
                labels: Object.keys(cids),
                datasets: [{ label: 'Erros', data: Object.values(cids), backgroundColor: '#4e73df', borderRadius: 5 }]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false },
                    datalabels: { anchor: 'end', align: 'top', font: { weight: 'bold' }, formatter: Math.round }
                },
                scales: { y: { beginAtZero: true, grace: '15%' } }
            }
        });

        chartCons = new Chart(document.getElementById('graficoConsultores'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(cons),
                datasets: [{ 
                    data: Object.values(cons), 
                    backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#6610f2', '#5a5c69', '#2e59d9'],
                }]
            },
            options: { 
                maintainAspectRatio: false,
                plugins: { 
                    legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } },
                    datalabels: { color: '#fff', font: { weight: 'bold' } }
                },
                onClick: (evt, elements) => {
                    if (elements.length > 0) {
                        const index = elements[0].index;
                        filtrarPorConsultor(chartCons.data.labels[index]);
                    }
                }
            }
        });

        if (filtroConsultorAtivo) {
            const errosDoConsultor = registros.filter(r => r.consultor === filtroConsultorAtivo);
            const contagemErros = {};
            errosDoConsultor.forEach(r => contagemErros[r.tipoErro] = (contagemErros[r.tipoErro] || 0) + 1);
            chartCids.data.labels = Object.keys(contagemErros);
            chartCids.data.datasets[0].data = Object.values(contagemErros);
            chartCids.update();
        }
    }

    function filtrarPorConsultor(nome) {
        filtroConsultorAtivo = nome;
        document.getElementById('avisoFiltro').style.display = 'flex';
        document.getElementById('nomeFiltro').innerText = nome;
        document.getElementById('tituloBarra').innerText = `Tipos de Erros: ${nome}`;
        render();
    }

    function limparFiltroGrafico() {
        filtroConsultorAtivo = null;
        document.getElementById('avisoFiltro').style.display = 'none';
        document.getElementById('tituloBarra').innerText = `Erros por Cidade`;
        render();
    }

    function atualizarRankings() {
        const countsCons = {}, countsErro = {};
        registros.forEach(r => {
            countsCons[r.consultor] = (countsCons[r.consultor] || 0) + 1;
            countsErro[r.tipoErro] = (countsErro[r.tipoErro] || 0) + 1;
        });

        const sortRanking = (obj) => Object.entries(obj).sort((a, b) => b[1] - a[1]);

        // Removido o .slice(0, 5) para mostrar TODOS
        document.getElementById('rankConsultores').innerHTML = sortRanking(countsCons).map(item => `
            <div class="rank-item">
                <span class="rank-name">${item[0]}</span>
                <span class="rank-count">${item[1]}</span>
            </div>
        `).join('') || '---';

        document.getElementById('rankErros').innerHTML = sortRanking(countsErro).map(item => `
            <div class="rank-item">
                <span class="rank-name">${item[0]}</span>
                <span class="rank-count">${item[1]}</span>
            </div>
        `).join('') || '---';
    }

    function atualizarStatus(txt, cor) {
        const s = document.getElementById('status');
        s.innerText = "● " + txt; s.style.color = cor;
    }

    function exportarCSV() {
        let csv = "\ufeffCliente;Erro;Cidade;Consultor\n" + registros.map(r => `${r.cliente};${r.tipoErro};${r.cidade};${r.consultor}`).join("\n");
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `auditoria.csv`; l.click();
    }

    async function limparTudo() { if(confirm("Apagar tudo?")) { registros = []; render(); await salvar(); } }

    carregar();
</script>
</body>
</html>
